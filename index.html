<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>Katalog VOD Premium</title>
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Cinzel:wght@600;700&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="ignite/styles.css" />
    </head>
    <body class="dark-theme">
        <div class="glows">
            <div class="glow-blob blob-violet"></div>
            <div class="glow-blob blob-cyan"></div>
            <div class="glow-blob blob-pink"></div>
            <div class="glow-blob blob-teal"></div>
            <div class="glow-blob blob-indigo"></div>
            <div class="glow-blob blob-orange"></div>
            <div class="glow-blob blob-green"></div>
        </div>
        <div class="rgb-ring-top"></div>

        <div class="header">
            <canvas id="titleCanvas"></canvas>
            <div class="header-left">
                <div class="title-wrapper">
                    <div class="title-tag">VOD PREMIUM</div>
                    <div class="title" id="mainHeaderTitle">MEMUAT...</div>
                </div>
            </div>
            <div class="top-tools">
                <div class="btn-circle" onclick="toggleAppTheme()" id="ic-t">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z" />
                    </svg>
                </div>
                <div class="user-profile" id="userProfile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Pengguna VOD</span>
                        <span class="user-id" id="userId">Tamu Server</span>
                    </div>
                    <div class="avatar-ring">
                        <img
                            id="userAvatar"
                            class="user-avatar"
                            src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231f2436'/%3E%3Ccircle cx='50' cy='35' r='18' fill='%239ca3af'/%3E%3Cpath d='M25 90c0-15 15-25 25-25s25 10 25 25' fill='%239ca3af'/%3E%3C/svg%3E"
                            alt="Avatar"
                        />
                    </div>
                </div>
            </div>
        </div>

        <div class="search-wrapper">
            <svg viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            <input type="text" id="iptSearch" placeholder="Eksplorasi VOD Terbaik..." />
            <div class="search-glow"></div>
        </div>

        <div class="filter-bar">
            <div class="filter-active-tag" id="filterActiveTag">
                <span class="filter-tag-dot"></span>
                <span id="filterTagLabel">SEMUA</span>
            </div>
            <button class="filter-list-btn" id="filterListBtn" onclick="openCatModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6"/>
                    <line x1="8" y1="12" x2="21" y2="12"/>
                    <line x1="8" y1="18" x2="21" y2="18"/>
                    <line x1="3" y1="6" x2="3.01" y2="6"/>
                    <line x1="3" y1="12" x2="3.01" y2="12"/>
                    <line x1="3" y1="18" x2="3.01" y2="18"/>
                </svg>
                <span>Kategori</span>
                <span class="filter-list-count" id="filterListCount">0</span>
            </button>
        </div>

        <div class="cat-modal-bg" id="catModalBg" onclick="closeCatModal()"></div>
        <div class="cat-modal" id="catModal">
            <div class="cat-modal-header">
                <div class="cat-modal-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="cat-modal-icon">
                        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                    PILIH KATEGORI
                </div>
                <button class="cat-modal-close" onclick="closeCatModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="cat-modal-body" id="catBox"></div>
        </div>

        <div id="v-home" class="view active">
            <div class="carousel" id="cr"></div>
            <div class="section-label">
                <span class="section-line"></span>
                <span class="section-text">SEMUA KONTEN</span>
                <span class="section-line"></span>
            </div>
            <div class="grid-movie" id="gr"></div>
            <div class="empty" id="h-e" style="display: none">
                <div class="empty-icon">😕</div>
                <div class="empty-text">Katalog belum ditemukan</div>
                <div class="empty-sub">Coba muat ulang halaman</div>
            </div>
        </div>

        <div id="v-fav" class="view">
            <div class="tab-title">
                <svg viewBox="0 0 24 24" class="tab-icon"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                Favorit Anda
            </div>
            <div class="grid-movie" id="gf"></div>
            <div class="empty" id="f-e" style="display: none">
                <div class="empty-icon">🗂️</div>
                <div class="empty-text">Belum ada favorit</div>
                <div class="empty-sub">Simpan film yang Anda suka</div>
            </div>
        </div>

        <div id="v-hist" class="view">
            <div class="tab-title">
                <svg viewBox="0 0 24 24" class="tab-icon"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                Riwayat Tontonan
            </div>
            <div class="grid-movie" id="gh"></div>
            <div class="empty" id="hs-e" style="display: none">
                <div class="empty-icon">📜</div>
                <div class="empty-text">Riwayat masih kosong</div>
                <div class="empty-sub">Mulai tonton film sekarang</div>
            </div>
        </div>

        <div class="btm-nav">
            <div class="ntb active" onclick="switchInterfaceView('v-home', this)">
                <div class="ntb-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    <div class="ntb-glow"></div>
                </div>
                <span>Beranda</span>
            </div>
            <div class="ntb" onclick="switchInterfaceView('v-fav', this)">
                <div class="ntb-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                    <div class="ntb-glow"></div>
                </div>
                <span>Favorit</span>
            </div>
            <div class="ntb" onclick="switchInterfaceView('v-hist', this)">
                <div class="ntb-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
                    </svg>
                    <div class="ntb-glow"></div>
                </div>
                <span>Riwayat</span>
            </div>
        </div>

        <div class="bottom-sheet-bg" id="mbg" onclick="closeMediaDetails()"></div>
        <div class="bottom-sheet" id="msh">
            <div class="bs-inner">
                <div class="bs-hero">
                    <div class="bs-hero-grid"></div>
                    <div class="bs-hero-scan"></div>
                    <div class="bs-hero-overlay"></div>
                    <button class="bs-back-btn" onclick="closeMediaDetails()">
                        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M7.5 2L3.5 5.5L7.5 9" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        KEMBALI
                    </button>
                    <div class="bs-poster-zone">
                        <div class="bs-poster-ring-outer">
                            <div class="bs-poster-ring-inner">
                                <img id="mimg" src="" class="bs-poster-img" />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bs-body">
                    <div style="height:11px"></div>
                    <div class="bs-title" id="mti"></div>
                    <div class="bs-badges" id="mmet"></div>
                    
                    <div class="bs-divider"></div>
                    
                    <div class="bs-synopsis-wrap">
                        <div class="bs-quote-bar"></div>
                        <div class="bs-synopsis" id="msyn"></div>
                    </div>
                    
                    <div class="bs-divider"></div>

                    <div class="bs-actions">
                        <div class="bs-action-row">
                            <button class="bs-act-btn bs-act-share" id="btShare">
                                <div class="bs-act-icon">
                                    <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="17" cy="4.5" r="2.5" stroke="#00d4ff" stroke-width="1.5"/><circle cx="5" cy="11" r="2.5" stroke="#00d4ff" stroke-width="1.5"/><circle cx="17" cy="17.5" r="2.5" stroke="#00d4ff" stroke-width="1.5"/><path d="M7.2 9.8L14.8 5.7" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/><path d="M7.2 12.2L14.8 16.3" stroke="#00d4ff" stroke-width="1.2" stroke-linecap="round"/></svg>
                                </div>
                                <span class="bs-act-label">BAGIKAN</span>
                            </button>
                            <button class="bs-act-btn bs-act-save" id="btFav">
                                <div class="bs-act-icon">
                                    <svg id="btFIc" width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 4C11 4 4.5 8 4.5 13.5C4.5 16.5 7.4 19 11 19C14.6 19 17.5 16.5 17.5 13.5C17.5 8 11 4 11 4Z" stroke="#ff0080" stroke-width="1.5" stroke-linejoin="round"/><path d="M11 9.5V14.5M8.5 12H13.5" stroke="#ff0080" stroke-width="1.5" stroke-linecap="round"/></svg>
                                </div>
                                <span class="bs-act-label">SIMPAN</span>
                            </button>
                        </div>
                        
                        <div class="bs-play-wrap">
                            <div class="bs-play-glow"></div>
                            <button class="bs-play-btn" id="btPlay">
                                <div class="bs-play-icon"></div>
                                PUTAR MOVIE GRATIS
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script src="pulse/app.js"></script>
    </body>
</html>
