<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katalog VOD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f0f0f; --card: #1a1a1a; --primary: #E50914; --text: #ffffff; --text-muted: #aaaaaa; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); overflow-x: hidden; }
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #333; }
        .app-title { font-size: 18px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50vw; }
        .user-profile { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .user-info-text { display: flex; flex-direction: column; align-items: flex-end; }
        .user-name { font-size: 13px; font-weight: 700; }
        .user-id { font-size: 10px; color: var(--text-muted); }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }
        .search-container { padding: 15px 20px 0; }
        .search-bar { width: 100%; padding: 12px 15px; border-radius: 8px; border: none; background: #222; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        .search-bar:focus { background: #2a2a2a; box-shadow: 0 0 0 2px var(--primary); }
        .filter-container { display: flex; gap: 10px; padding: 15px 20px; overflow-x: auto; scrollbar-width: none; }
        .filter-container::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #444; background: transparent; color: #ccc; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
        .hero-banner { margin: 0 20px 20px; border-radius: 12px; overflow: hidden; position: relative; height: 200px; display: none; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .hero-banner img { width: 100%; height: 100%; object-fit: cover; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(15,15,15,1) 0%, rgba(15,15,15,0) 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; }
        .hero-badge { background: var(--primary); color: #fff; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 4px; width: max-content; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .hero-title { font-size: 22px; font-weight: 800; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px 30px; }
        .movie-card { border-radius: 8px; overflow: hidden; background-color: var(--card); cursor: pointer; position: relative; transition: 0.2s; display: flex; flex-direction: column; }
        .movie-card:active { transform: scale(0.96); }
        .movie-poster-container { position: relative; width: 100%; padding-top: 150%; background: #222; }
        .movie-poster-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; }
        .movie-poster-container img.loaded { opacity: 1; }
        .movie-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .movie-title { font-size: 13px; font-weight: 600; line-height: 1.3; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .movie-tags { display: flex; justify-content: space-between; align-items: center; }
        .tag-prem { color: var(--primary); font-size: 10px; font-weight: 800; border: 1px solid var(--primary); padding: 2px 5px; border-radius: 4px; }
        .tag-free { color: #28a745; font-size: 10px; font-weight: 800; border: 1px solid #28a745; padding: 2px 5px; border-radius: 4px; }
        .shimmer { animation: shimmer 1.5s infinite linear; background: linear-gradient(to right, #222 4%, #333 25%, #222 36%); background-size: 1000px 100%; }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 14px; font-weight: 500; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="app-title" id="botTitle">VOD</div>
        <div class="user-profile" id="userProfile">
            <div class="user-info-text">
                <span class="user-name" id="userName">Guest</span>
                <span class="user-id" id="userId">ID: -</span>
            </div>
            <img id="userAvatar" class="user-avatar" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="User">
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="Cari judul drama...">
    </div>

    <div class="filter-container">
        <button class="filter-btn active" data-filter="all">Semua</button>
        <button class="filter-btn" data-filter="prem">💎 Premium</button>
        <button class="filter-btn" data-filter="free">🆓 Gratis</button>
    </div>

    <div class="hero-banner" id="heroBanner">
        <div class="shimmer" style="width:100%; height:100%; position:absolute; top:0; left:0; z-index:1;" id="heroShimmer"></div>
        <img id="heroImg" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Hero">
        <div class="hero-overlay" id="heroOverlay" style="z-index:2;">
            <div class="hero-badge" id="heroBadge">PREMIUM</div>
            <h2 class="hero-title" id="heroTitle">Memuat...</h2>
        </div>
    </div>

    <div class="grid-container" id="catalogGrid"></div>
    <div id="emptyState" class="empty-state">Tidak ada drama ditemukan.</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('userName').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
            document.getElementById('userId').innerText = "ID: " + user.id;
            document.getElementById('userAvatar').src = user.photo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.first_name)}&background=1a1a1a&color=fff`;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const dbId = urlParams.get('db_id');
        const encodedToken = urlParams.get('token');
        let dynamicBotUsername = "Bot";
        let botToken = "";

        if (encodedToken) {
            botToken = atob(encodedToken.replace(/-/g, '+').replace(/_/g, '/'));
        }

        let catalogData =[];
        let currentFilter = 'all';

        async function initApp() {
            if (botToken) {
                try {
                    const res = await fetch(`https://api.telegram.org/bot${botToken}/getMe`);
                    const json = await res.json();
                    if (json.ok) {
                        dynamicBotUsername = json.result.username;
                        document.getElementById('botTitle').innerText = json.result.first_name;
                    }
                } catch (e) {}
            }

            if (!dbId) {
                document.getElementById('emptyState').innerText = "Akses ditolak. Buka dari bot.";
                document.getElementById('emptyState').style.display = "block";
                return;
            }

            try {
                if (dbId.startsWith("B64_")) {
                    const b64 = dbId.replace("B64_", "").replace(/-/g, '+').replace(/_/g, '/');
                    catalogData = JSON.parse(decodeURIComponent(escape(atob(b64))));
                    renderApp();
                } else {
                    try {
                        const res = await fetch(`https://spaceb.in/api/v1/documents/${dbId}`);
                        const json = await res.json();
                        catalogData = JSON.parse(json.payload.content);
                        renderApp();
                    } catch (err1) {
                        const fallbackRes = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://spaceb.in/api/v1/documents/${dbId}`)}`);
                        const fallbackJson = await fallbackRes.json();
                        const spacebinData = JSON.parse(fallbackJson.contents);
                        catalogData = JSON.parse(spacebinData.payload.content);
                        renderApp();
                    }
                }
            } catch (e) {
                document.getElementById('emptyState').innerText = "Gagal mengunduh database cloud.";
                document.getElementById('emptyState').style.display = "block";
            }
        }

        async function fetchImage(fileId) {
            if (!fileId || !botToken) return null;
            const cacheKey = `tg_img_${fileId}`;
            const cached = sessionStorage.getItem(cacheKey);
            if (cached) return cached;

            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/getFile?file_id=${fileId}`);
                const json = await response.json();
                if (json.ok && json.result.file_path) {
                    const url = `https://api.telegram.org/file/bot${botToken}/${json.result.file_path}`;
                    sessionStorage.setItem(cacheKey, url);
                    return url;
                }
            } catch (e) {}
            return null;
        }

        function playMovie(id) {
            tg.openTelegramLink(`https://t.me/${dynamicBotUsername}?start=mp_${id}`);
            tg.close();
        }

        function renderApp() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const grid = document.getElementById('catalogGrid');
            const hero = document.getElementById('heroBanner');
            const emptyState = document.getElementById('emptyState');
            
            grid.innerHTML = '';
            hero.style.display = 'none';
            emptyState.style.display = 'none';

            let filteredData = catalogData.filter(item => {
                const matchQuery = item.t.toLowerCase().includes(query);
                const matchFilter = currentFilter === 'all' || 
                                  (currentFilter === 'prem' && item.is_prem === 1) || 
                                  (currentFilter === 'free' && item.is_prem === 0);
                return matchQuery && matchFilter;
            });

            if (filteredData.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            if (query === '' && currentFilter === 'all' && filteredData.length > 0) {
                const featured = filteredData[0];
                hero.style.display = 'block';
                document.getElementById('heroTitle').innerText = featured.t;
                const badge = document.getElementById('heroBadge');
                badge.innerText = featured.is_prem ? 'PREMIUM' : 'GRATIS';
                badge.style.backgroundColor = featured.is_prem ? 'var(--primary)' : '#28a745';
                hero.onclick = () => playMovie(featured.id);

                fetchImage(featured.p).then(url => {
                    if (url) {
                        document.getElementById('heroImg').src = url;
                        document.getElementById('heroShimmer').style.display = 'none';
                    }
                });
                
                filteredData = filteredData.slice(1);
            }

            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => playMovie(item.id);

                const badgeClass = item.is_prem ? 'tag-prem' : 'tag-free';
                const badgeText = item.is_prem ? 'Premium' : 'Gratis';

                card.innerHTML = `
                    <div class="movie-poster-container shimmer" id="shimmer-${item.id}">
                        <img id="img-${item.id}" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Poster">
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${item.t}</div>
                        <div class="movie-tags">
                            <span class="${badgeClass}">${badgeText}</span>
                            <span style="font-size:10px; color:#666;">▶ Play</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);

                fetchImage(item.p).then(url => {
                    if (url) {
                        const imgEl = document.getElementById(`img-${item.id}`);
                        imgEl.src = url;
                        imgEl.onload = () => {
                            imgEl.classList.add('loaded');
                            document.getElementById(`shimmer-${item.id}`).classList.remove('shimmer');
                        };
                    }
                });
            });
        }

        document.getElementById('searchInput').addEventListener('input', renderApp);
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.getAttribute('data-filter');
                renderApp();
            });
        });

        initApp();
    </script>
</body>
</html>
