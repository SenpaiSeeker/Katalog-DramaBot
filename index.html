<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katalog Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: var(--tg-theme-bg-color, #141414); color: var(--tg-theme-text-color, #ffffff); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: sticky; top: 0; z-index: 10; }
        .app-title { font-size: 20px; font-weight: bold; }
        .user-profile { display: flex; align-items: center; gap: 10px; }
        .user-info-text { display: flex; flex-direction: column; align-items: flex-end; }
        .user-name { font-size: 14px; font-weight: bold; }
        .user-id { font-size: 11px; color: #aaaaaa; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .empty-state { text-align: center; padding: 50px 20px; color: #888; }
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .movie-card { position: relative; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: transform 0.2s; background-color: #222; cursor: pointer; }
        .movie-card:active { transform: scale(0.95); }
        .movie-card img { width: 100%; height: 250px; object-fit: cover; display: block; }
        .movie-info { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 20px 10px 10px; }
        .movie-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; text-shadow: 1px 1px 2px black;}
        .movie-badge { background-color: #E50914; color: white; font-size: 10px; padding: 2px 6px; border-radius: 3px; display: inline-block; }
        .free-badge { background-color: #28a745; }
    </style>
</head>
<body>
    <div class="header">
        <div class="app-title" id="botTitle">Katalog VOD</div>
        <div class="user-profile" id="userProfile">
            <div class="user-info-text">
                <span class="user-name" id="userName">Tamu</span>
                <span class="user-id" id="userId">ID: -</span>
            </div>
            <img id="userAvatar" class="user-avatar" src="https://ui-avatars.com/api/?name=Tamu&background=random" alt="User">
        </div>
    </div>

    <div id="loading" class="empty-state">Memuat data dari bot...</div>
    <div class="grid-container" id="catalogGrid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            const lastName = user.last_name ? " " + user.last_name : "";
            const fullName = user.first_name + lastName;
            document.getElementById('userName').innerText = fullName;
            document.getElementById('userId').innerText = "ID: " + user.id;
            document.getElementById('userAvatar').src = user.photo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.first_name)}&background=random`;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const dynamicBotUsername = urlParams.get('bot') || "Katalog";
        document.getElementById('botTitle').innerText = dynamicBotUsername;
        
        const rawData = urlParams.get('data');
        const encodedToken = urlParams.get('token');
        
        let botToken = "";
        if (encodedToken) {
            botToken = atob(encodedToken.replace(/-/g, '+').replace(/_/g, '/'));
        }

        async function fetchTelegramFile(fileId) {
            if (!botToken || !fileId) return "https://via.placeholder.com/500x750/222222/FFFFFF/?text=No+Poster";
            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/getFile?file_id=${fileId}`);
                const json = await response.json();
                if (json.ok && json.result.file_path) {
                    return `https://api.telegram.org/file/bot${botToken}/${json.result.file_path}`;
                }
            } catch (e) {}
            return "https://via.placeholder.com/500x750/222222/FFFFFF/?text=Error";
        }

        async function renderCatalog() {
            const grid = document.getElementById('catalogGrid');
            const loading = document.getElementById('loading');

            if (!rawData) {
                loading.innerText = "Tidak ada data yang dikirim dari bot.";
                return;
            }

            try {
                const decodedData = decodeURIComponent(escape(atob(rawData.replace(/-/g, '+').replace(/_/g, '/'))));
                const catalogList = JSON.parse(decodedData);

                if (catalogList.length === 0) {
                    loading.innerText = "Katalog kosong.";
                    return;
                }

                loading.style.display = "none";

                for (const item of catalogList) {
                    const badgeClass = item.is_prem ? "movie-badge" : "movie-badge free-badge";
                    const badgeText = item.is_prem ? "Premium" : "Gratis";
                    
                    const card = document.createElement('div');
                    card.className = "movie-card";
                    card.onclick = () => {
                        tg.openTelegramLink(`https://t.me/${dynamicBotUsername}?start=mp_${item.id}`);
                        tg.close();
                    };

                    card.innerHTML = `
                        <img id="img-${item.id}" src="https://via.placeholder.com/500x750/111111/444444/?text=Loading..." alt="Poster">
                        <div class="movie-info">
                            <div class="movie-title">${item.t}</div>
                            <div class="${badgeClass}">${badgeText}</div>
                        </div>
                    `;
                    grid.appendChild(card);

                    fetchTelegramFile(item.p).then(imgUrl => {
                        document.getElementById(`img-${item.id}`).src = imgUrl;
                    });
                }
            } catch (error) {
                loading.innerText = "Gagal memproses data.";
            }
        }

        renderCatalog();
    </script>
</body>
</html>
