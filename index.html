<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katalog Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: var(--tg-theme-bg-color, #141414);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
        }
        .header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .app-title {
            font-size: 18px;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50%;
        }
        .user-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-info-text {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .user-name {
            font-size: 13px;
            font-weight: bold;
        }
        .user-id {
            font-size: 10px;
            color: #aaaaaa;
        }
        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: cover;
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #888;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 15px;
        }
        .movie-card {
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
            background-color: #1a1a1a;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .movie-card:active {
            transform: scale(0.95);
        }
        .movie-card img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: contain;
            background-color: #000000;
            display: block;
        }
        .movie-info {
            padding: 12px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }
        .movie-title {
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #ffffff;
        }
        .movie-badge {
            background-color: #E50914;
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            font-weight: bold;
        }
        .free-badge {
            background-color: #28a745;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="app-title" id="botTitle">Memuat...</div>
        <div class="user-profile" id="userProfile">
            <div class="user-info-text">
                <span class="user-name" id="userName">Tamu</span>
                <span class="user-id" id="userId">ID: -</span>
            </div>
            <img id="userAvatar" class="user-avatar" src="https://ui-avatars.com/api/?name=Tamu&background=random" alt="User">
        </div>
    </div>

    <div id="loading" class="empty-state">Memuat data dari server...</div>
    <div class="grid-container" id="catalogGrid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user;
        if (user) {
            const lastName = user.last_name ? " " + user.last_name : "";
            const fullName = user.first_name + lastName;
            document.getElementById('userName').innerText = fullName;
            document.getElementById('userId').innerText = "ID: " + user.id;
            document.getElementById('userAvatar').src = user.photo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.first_name)}&background=random`;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const rawData = urlParams.get('data');
        const encodedToken = urlParams.get('token');
        
        let botToken = "";
        let dynamicBotUsername = "";

        if (encodedToken) {
            botToken = atob(encodedToken.replace(/-/g, '+').replace(/_/g, '/'));
        }

        async function initBot() {
            if (!botToken) {
                document.getElementById('botTitle').innerText = "Katalog VOD";
                return;
            }
            try {
                const res = await fetch(`https://api.telegram.org/bot${botToken}/getMe`);
                const json = await res.json();
                if (json.ok) {
                    dynamicBotUsername = json.result.username;
                    document.getElementById('botTitle').innerText = json.result.first_name;
                }
            } catch (e) {
                document.getElementById('botTitle').innerText = "Katalog VOD";
            }
        }

        async function fetchTelegramFile(fileId) {
            if (!botToken || !fileId) return "https://via.placeholder.com/500x750/000000/333333/?text=No+Poster";
            try {
                const response = await fetch(`https://api.telegram.org/bot${botToken}/getFile?file_id=${fileId}`);
                const json = await response.json();
                if (json.ok && json.result.file_path) {
                    return `https://api.telegram.org/file/bot${botToken}/${json.result.file_path}`;
                }
            } catch (e) {}
            return "https://via.placeholder.com/500x750/000000/333333/?text=Error";
        }

        async function renderCatalog() {
            await initBot();

            const grid = document.getElementById('catalogGrid');
            const loading = document.getElementById('loading');

            if (!rawData) {
                loading.innerText = "Tidak ada data yang dikirim dari bot.";
                return;
            }

            try {
                const decodedData = decodeURIComponent(escape(atob(rawData.replace(/-/g, '+').replace(/_/g, '/'))));
                const catalogList = JSON.parse(decodedData);

                if (catalogList.length === 0) {
                    loading.innerText = "Katalog kosong.";
                    return;
                }

                loading.style.display = "none";

                for (const item of catalogList) {
                    const badgeClass = item.is_prem ? "movie-badge" : "movie-badge free-badge";
                    const badgeText = item.is_prem ? "Premium" : "Gratis";
                    
                    const card = document.createElement('div');
                    card.className = "movie-card";
                    card.onclick = () => {
                        if(dynamicBotUsername) {
                            tg.openTelegramLink(`https://t.me/${dynamicBotUsername}?start=mp_${item.id}`);
                            tg.close();
                        }
                    };

                    card.innerHTML = `
                        <img id="img-${item.id}" src="https://via.placeholder.com/500x750/111111/444444/?text=Loading..." alt="Poster">
                        <div class="movie-info">
                            <div class="movie-title">${item.t}</div>
                            <div class="${badgeClass}">${badgeText}</div>
                        </div>
                    `;
                    grid.appendChild(card);

                    fetchTelegramFile(item.p).then(imgUrl => {
                        document.getElementById(`img-${item.id}`).src = imgUrl;
                    });
                }
            } catch (error) {
                loading.innerText = "Gagal memproses data dari bot.";
            }
        }

        renderCatalog();
    </script>
</body>
</html>
