<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <title>Katalog VOD Premium</title>
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="ignite/styles.css" />
    </head>
    <body class="dark-theme">
        <div class="glows">
            <div class="glow-blob blob-violet"></div>
            <div class="glow-blob blob-cyan"></div>
            <div class="glow-blob blob-pink"></div>
            <div class="glow-blob blob-teal"></div>
            <div class="glow-blob blob-indigo"></div>
        </div>
        <div class="header">
            <canvas id="titleCanvas"></canvas>
            <div class="header-left">
                <div class="title-wrapper">
                    <div class="title-tag">VOD PREMIUM</div>
                    <div class="title" id="mainHeaderTitle">MEMUAT...</div>
                </div>
            </div>
            <div class="top-tools">
                <div class="btn-circle" onclick="toggleAppTheme()" id="ic-t">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z" />
                    </svg>
                </div>
                <div class="user-profile" id="userProfile">
                    <div class="user-info">
                        <span class="user-name" id="userName">Pengguna VOD</span>
                        <span class="user-id" id="userId">Tamu Server</span>
                    </div>
                    <div class="avatar-ring">
                        <img
                            id="userAvatar"
                            class="user-avatar"
                            src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231f2436'/%3E%3Ccircle cx='50' cy='35' r='18' fill='%239ca3af'/%3E%3Cpath d='M25 90c0-15 15-25 25-25s25 10 25 25' fill='%239ca3af'/%3E%3C/svg%3E"
                            alt="Avatar"
                        />
                    </div>
                </div>
            </div>
        </div>
        <div class="search-wrapper">
            <svg viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            <input type="text" id="iptSearch" placeholder="Eksplorasi VOD Terbaik..." />
            <div class="search-glow"></div>
        </div>
        <div class="category-scroll" id="catBox"></div>
        <div id="v-home" class="view active">
            <div class="carousel" id="cr"></div>
            <div class="section-label">
                <span class="section-line"></span>
                <span class="section-text">SEMUA KONTEN</span>
                <span class="section-line"></span>
            </div>
            <div class="grid-movie" id="gr"></div>
            <div class="empty" id="h-e" style="display: none">
                <div class="empty-icon">😕</div>
                <div class="empty-text">Katalog belum ditemukan</div>
                <div class="empty-sub">Coba muat ulang halaman</div>
            </div>
        </div>
        <div id="v-fav" class="view">
            <div class="tab-title">
                <svg viewBox="0 0 24 24" class="tab-icon"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                Favorit Anda
            </div>
            <div class="grid-movie" id="gf"></div>
            <div class="empty" id="f-e" style="display: none">
                <div class="empty-icon">🗂️</div>
                <div class="empty-text">Belum ada favorit</div>
                <div class="empty-sub">Simpan film yang Anda suka</div>
            </div>
        </div>
        <div id="v-hist" class="view">
            <div class="tab-title">
                <svg viewBox="0 0 24 24" class="tab-icon"><path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
                Riwayat Tontonan
            </div>
            <div class="grid-movie" id="gh"></div>
            <div class="empty" id="hs-e" style="display: none">
                <div class="empty-icon">📜</div>
                <div class="empty-text">Riwayat masih kosong</div>
                <div class="empty-sub">Mulai tonton film sekarang</div>
            </div>
        </div>
        <div class="btm-nav">
            <div class="ntb active" onclick="switchInterfaceView('v-home', this)">
                <div class="ntb-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                        <polyline points="9 22 9 12 15 12 15 22" />
                    </svg>
                    <div class="ntb-glow"></div>
                </div>
                <span>Beranda</span>
            </div>
            <div class="ntb" onclick="switchInterfaceView('v-fav', this)">
                <div class="ntb-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                    </svg>
                    <div class="ntb-glow"></div>
                </div>
                <span>Favorit</span>
            </div>
            <div class="ntb" onclick="switchInterfaceView('v-hist', this)">
                <div class="ntb-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
                    </svg>
                    <div class="ntb-glow"></div>
                </div>
                <span>Riwayat</span>
            </div>
        </div>
        <div class="bottom-sheet-bg" id="mbg" onclick="closeMediaDetails()"></div>
        <div class="bottom-sheet" id="msh">
            <div class="bs-close-btn" onclick="closeMediaDetails()">
                <svg viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                </svg>
            </div>
            <div class="bs-handle"></div>
            <div class="bs-poster-wrap">
                <img id="mimg" src="" class="bs-poster" />
                <div class="bs-poster-glow"></div>
            </div>
            <div class="bs-title" id="mti"></div>
            <div class="bs-meta" id="mmet"></div>
            <div class="bs-synopsis" id="msyn"></div>
            <div class="bs-divider"></div>
            <div class="bs-controls">
                <div class="bs-icon" id="btShare">
                    <div class="bs-icon-btn">
                        <svg viewBox="0 0 24 24">
                            <circle cx="18" cy="5" r="3" />
                            <circle cx="6" cy="12" r="3" />
                            <circle cx="18" cy="19" r="3" />
                            <line x1="8.59" x2="15.42" y1="13.51" y2="17.49" />
                            <line x1="15.41" x2="8.59" y1="6.51" y2="10.49" stroke-width="2" stroke="currentColor" />
                        </svg>
                    </div>
                    <span>Bagikan</span>
                </div>
                <div class="bs-icon" id="btFav">
                    <div class="bs-icon-btn fav-btn">
                        <svg id="btFIc" viewBox="0 0 24 24">
                            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" stroke="currentColor" fill="none" />
                        </svg>
                    </div>
                    <span>Simpan</span>
                </div>
            </div>
        </div>
        <script src="pulse/app.js"></script>
    </body>
</html>
