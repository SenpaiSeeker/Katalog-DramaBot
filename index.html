<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katalog Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #09041a; --card: #181134; --primary: #5c20da; --text: #ffffff; --text-muted: #8882a0; --badge-prem-bg: #2e1d5e; --badge-prem-text: #ebd561; --badge-free-bg: #123e2b; --badge-free-text: #4ce58d; --accent: #00f2fe; --shadow: rgba(0, 0, 0, 0.4); --shimmer-bg: #150f2e; --shimmer-accent: #211648; }
        body.light-theme { --bg: #f4f4f6; --card: #ffffff; --primary: #5c20da; --text: #1a1a1a; --text-muted: #6b6680; --badge-prem-bg: #e7e0f9; --badge-prem-text: #8e6205; --badge-free-bg: #e2f6ec; --badge-free-text: #178e47; --shadow: rgba(0, 0, 0, 0.08); --shimmer-bg: #e9e9ea; --shimmer-accent: #f2f2f3; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 70px; transition: background-color 0.3s, color 0.3s; }
        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); opacity: 0.98; z-index: 100; transition: background-color 0.3s; box-shadow: 0 4px 10px var(--shadow); }
        .header-left { display: flex; align-items: center; gap: 8px; overflow: hidden; cursor:pointer;}
        .play-logo { width: 32px; height: 32px; background-color: var(--card); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px rgba(92,32,218,0.4); flex-shrink: 0;}
        .play-logo svg { width: 14px; height: 14px; fill: var(--accent); margin-left: 2px; }
        .app-title { font-size: 16px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; color:var(--text); text-decoration:none;}
        .header-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .theme-btn { background: var(--card); border: 1px solid var(--card); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 5px var(--shadow); }
        .theme-btn svg { width: 16px; height: 16px; fill: var(--text); transition: fill 0.3s;}
        .user-profile { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-info-text { display: flex; flex-direction: column; align-items: flex-end; }
        .user-name { font-size: 13px; font-weight: 700; }
        .user-id { font-size: 10px; color: var(--text-muted); }
        .user-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 2px solid var(--card); transition: border-color 0.3s; }
        .search-box { margin: 15px 15px 0; background: var(--card); border-radius: 12px; display: flex; align-items: center; padding: 10px 15px; box-shadow: inset 0 2px 4px var(--shadow); transition: 0.3s; border: 1px solid transparent; }
        .search-box:focus-within { border-color: var(--primary); }
        .search-box svg { width: 18px; height: 18px; fill: var(--text-muted); flex-shrink: 0; margin-right: 10px; }
        .search-box input { flex-grow: 1; border: none; background: transparent; color: var(--text); font-size: 14px; outline: none; }
        .filter-container { display: flex; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .filter-container::-webkit-scrollbar { display: none; }
        .filter-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--card); background: var(--card); color: var(--text-muted); font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s; box-shadow: 0 2px 4px var(--shadow);}
        .filter-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .view-section { display: none; animation: fadeIn 0.3s; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 15px; }
        .movie-card { border-radius: 12px; overflow: hidden; background-color: var(--card); position: relative; transition: 0.2s; display: flex; flex-direction: column; box-shadow: 0 6px 12px var(--shadow); cursor:pointer; border: 1px solid rgba(255,255,255,0.02);}
        .movie-card:active { transform: scale(0.96); box-shadow: 0 2px 6px var(--shadow); }
        .movie-poster-container { position: relative; width: 100%; aspect-ratio: 2 / 3; background: var(--bg); transition: background-color 0.3s; overflow: hidden; }
        .movie-poster-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s; object-position: center;}
        .movie-poster-container img.loaded { opacity: 1; }
        .movie-info { padding: 12px 10px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; justify-content: space-between; }
        .movie-title { font-size: 12px; font-weight: 700; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: var(--text); min-height: 33px;}
        .card-actions { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .tag-prem { background-color: var(--badge-prem-bg); color: var(--badge-prem-text); font-size: 9px; font-weight: 800; padding: 3px 6px; border-radius: 4px; display:flex; align-items:center; gap:3px;}
        .tag-free { background-color: var(--badge-free-bg); color: var(--badge-free-text); font-size: 9px; font-weight: 800; padding: 3px 6px; border-radius: 4px; }
        .action-right { display: flex; align-items: center; gap: 6px; }
        .fav-btn { background: none; border: none; color: var(--text-muted); padding: 0; font-size: 14px; cursor: pointer; transition: 0.2s, color 0.3s; outline: none; }
        .fav-btn svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; transition: 0.2s; }
        .fav-btn.active svg { fill: var(--primary); stroke: var(--primary); transform: scale(1.1); }
        .play-indicator { font-size: 9px; font-weight: 700; color: var(--text-muted); display: flex; align-items: center; gap: 2px; }
        .play-indicator svg { fill: currentColor; }
        .pagination-container { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px; }
        .pagination-info { font-size: 16px; font-weight: 800; }
        .pagination-dots { display: flex; gap: 6px; }
        .dot { width: 6px; height: 6px; border-radius: 50%; background-color: var(--text-muted); opacity: 0.3; transition: 0.3s; }
        .dot.active { width: 16px; border-radius: 6px; background-color: var(--accent); opacity: 1; }
        .pagination-actions { display: flex; justify-content: center; gap: 20px; width: 100%; }
        .page-btn { flex: 1; max-width: 140px; padding: 12px 15px; border-radius: 20px; border: none; background: var(--primary); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(92, 32, 218, 0.4); display: flex; align-items: center; justify-content: center; gap: 5px; }
        .page-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; background: var(--card); color: var(--text-muted);}
        .page-btn:active:not(:disabled) { transform: scale(0.96); box-shadow: 0 2px 5px rgba(92, 32, 218, 0.4); }
        .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); font-size: 14px; font-weight: 500; display: none; line-height: 1.6;}
        
        .upgrade-wrapper { margin: 15px; background: linear-gradient(45deg, var(--card), var(--bg)); border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px var(--shadow); border: 1px solid rgba(255,255,255,0.05); }
        .upgrade-content { padding: 15px; }
        .upgrade-title { font-size: 16px; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .upgrade-title svg { fill: #ebd561; }
        .upgrade-desc { font-size: 12px; color: var(--text-muted); line-height: 1.4; margin-bottom: 15px; }
        .plans-container { display: flex; overflow-x: auto; gap: 10px; scrollbar-width: none; margin-bottom: 10px; padding-bottom: 5px; }
        .plans-container::-webkit-scrollbar { display: none; }
        .plan-card { min-width: 100px; flex-shrink: 0; background: var(--bg); border: 2px solid var(--card); border-radius: 10px; padding: 12px 10px; text-align: center; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; justify-content: center;}
        .plan-card.active { border-color: var(--primary); background: rgba(92, 32, 218, 0.1); box-shadow: 0 4px 10px rgba(92, 32, 218, 0.2); transform: scale(1.02); }
        .plan-title { font-size: 11px; font-weight: 700; color: var(--text); margin-bottom: 5px; }
        .plan-price { font-size: 14px; font-weight: 800; color: var(--accent); }
        .plan-save { font-size: 9px; color: var(--badge-free-text); margin-top: 5px; background: var(--badge-free-bg); padding: 2px 5px; border-radius: 3px; display: inline-block; align-self: center;}
        .buy-action-btn { width: 100%; background: linear-gradient(90deg, #5c20da, #00f2fe); border: none; color: #fff; padding: 14px; border-radius: 8px; font-weight: 800; font-size: 14px; cursor: pointer; box-shadow: 0 4px 10px rgba(92, 32, 218, 0.4); }
        .buy-action-btn:active { transform: scale(0.98); box-shadow: 0 2px 5px rgba(92, 32, 218, 0.4); }
        .shimmer { animation: shimmer 1.5s infinite linear; background: linear-gradient(to right, var(--shimmer-bg) 4%, var(--shimmer-accent) 25%, var(--shimmer-bg) 36%); background-size: 1000px 100%; }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }

        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: var(--bg); display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 -4px 10px var(--shadow); transition: background-color 0.3s; padding-bottom:env(safe-area-inset-bottom); border-top: 1px solid var(--card);}
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 33%; height: 100%; color: var(--text-muted); font-size: 9px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s; letter-spacing: 0.5px; position: relative;}
        .nav-item svg { width: 24px; height: 24px; margin-bottom: 4px; fill: none; stroke: currentColor; stroke-width: 2; transition: 0.3s;}
        .nav-item.active { color: var(--accent); }
        .nav-item.active svg { stroke: var(--accent); fill: rgba(0, 242, 254, 0.15);}
        .nav-item.active::after { content: ''; position: absolute; bottom: 8px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 5px var(--accent);}
        .tab-title { padding: 15px 15px 5px; font-size: 18px; font-weight: 800; display: flex; align-items: center; gap: 8px; color: var(--text); }
        .tab-title svg { width: 22px; height: 22px; fill: var(--primary); }
    </style>
</head>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); tg.ready();

        let botToken = ""; let dynamicBotUsername = "Bot"; let catalogData =[]; let tgPath = ""; let currentFilter = 'all'; let searchQuery = ''; let sysVars = { isP:false, uid_saweria: "", prm_pr: 30000 }; let plans =[]; let currentPlanSelected = 0; const initFName = tg.initDataUnsafe?.user?.first_name || "Guest"; const ITEMS_PER_PAGE = 10; const pageState = { home: 1, fav: 1, hist: 1 };
        let favorites = JSON.parse(localStorage.getItem('fav_dr_v3')) ||[]; let historyList = JSON.parse(localStorage.getItem('hist_dr_v3')) ||[]; let isDarkMode = localStorage.getItem('theme_dr_v3') === null ? true : localStorage.getItem('theme_dr_v3') === 'dark';

        function uTI() { const si = document.querySelector('#themeBtn svg'); if(isDarkMode) { si.innerHTML = `<path d="M12 3a9 9 0 109 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>`; } else { si.innerHTML = `<path d="M6.76 4.84l-1.8-1.79-1.41 1.41 1.79 1.79 1.42-1.41zM4 10.5H1v2h3v-2zm9-9.95h-2V3.5h2V.55zm7.45 3.91l-1.41-1.41-1.79 1.79 1.41 1.41 1.79-1.79zm-3.21 13.7l1.79 1.8 1.41-1.41-1.8-1.79-1.4 1.4zM20 10.5v2h3v-2h-3zm-8 11h-2v2.95h2V21.5zm-7.45-3.91l1.41 1.41 1.79-1.8-1.41-1.41-1.79 1.8zM12 5.5c-3.58 0-6.5 2.92-6.5 6.5s2.92 6.5 6.5 6.5 6.5-2.92 6.5-6.5-2.92-6.5-6.5-6.5zm0 11c-2.48 0-4.5-2.02-4.5-4.5S9.52 7.5 12 7.5s4.5 2.02 4.5 4.5-2.02 4.5-4.5 4.5z"/>`; } }
        function applyTheme() { if(isDarkMode) { document.body.classList.add('dark-theme'); document.body.classList.remove('light-theme'); } else { document.body.classList.add('light-theme'); document.body.classList.remove('dark-theme'); } if(tg.setHeaderColor) tg.setHeaderColor(isDarkMode ? '#09041a' : '#f4f4f6'); if(tg.setBackgroundColor) tg.setBackgroundColor(isDarkMode ? '#09041a' : '#f4f4f6'); uTI(); } applyTheme();
        function toggleTheme() { hapticLight(); isDarkMode = !isDarkMode; localStorage.setItem('theme_dr_v3', isDarkMode ? 'dark' : 'light'); applyTheme(); }
        const hapticLight = () => { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); }; const hapticHeavy = () => { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy'); };
        function updateStorage() { localStorage.setItem('fav_dr_v3', JSON.stringify(favorites)); localStorage.setItem('hist_dr_v3', JSON.stringify(historyList)); }

        function sE(msg) { document.getElementById('homeEmpty').innerText = msg; document.getElementById('homeEmpty').style.display = "block"; document.getElementById('homePagination').style.display="none";}
        async function initApp() {
            const u = tg.initDataUnsafe?.user; if (u) { document.getElementById('userName').innerText = u.first_name + (u.last_name ? " " + u.last_name : ""); document.getElementById('userId').innerText = "ID: " + u.id; document.getElementById('userAvatar').src = u.photo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(u.first_name)}&background=${isDarkMode?'181134':'ffffff'}&color=${isDarkMode?'fff':'1a1a1a'}`; }
            const uP = new URLSearchParams(window.location.search); const eP = uP.get('token');
            if (eP) {
                try {
                    const dP = atob(eP.replace(/-/g, '+').replace(/_/g, '/')); const prt = dP.split('|'); botToken = prt[0]; tgPath = prt[1] || ""; sysVars.uid_saweria = prt[2] || ""; sysVars.prm_pr = parseInt(prt[3]) || 30000; sysVars.isP = prt[4] === "1";
                    bPlans(); if (sysVars.uid_saweria.trim() !== "" && !sysVars.isP) { document.getElementById('upgradeContainer').style.display = "block"; rDP();}
                    if(tgPath) { if (tgPath.startsWith("B64_")) { catalogData = JSON.parse(decodeURIComponent(escape(atob(tgPath.replace("B64_", "").replace(/-/g, '+').replace(/_/g, '/'))))); } else { const gr = await fetch(`https://api.telegra.ph/getPage/${tgPath}?return_content=true`); const gj = await gr.json(); if (gj.ok) { let fs = ""; gj.result.content.forEach(nd => { if(nd.children) fs += nd.children[0]; }); catalogData = JSON.parse(fs); } } }
                    fetch(`https://api.telegram.org/bot${botToken}/getMe`).then(r => r.json()).then(j => { if (j.ok) { dynamicBotUsername = j.result.username; document.getElementById('botTitle').innerText = j.result.first_name.substring(0,25); } }).catch(()=>{});
                    renderAllTabs();
                } catch (e) { sE("Kesalahan API Internal Database"); }
            } else { sE("Tidak Berjalan: Sesi Web Token API Putus."); }
        }
        
        function bPlans(){
            const bp=sysVars.prm_pr; const pD=Math.max(1000, Math.floor(bp/30)); const p3D=Math.max(1000, Math.floor(bp/10)); const pW=Math.max(1000, Math.floor(bp/4)); const pY=bp*10;
            plans=[ {d:1, p:pD, s:"Hemat", l:"1 Hari", dt:1}, {d:3, p:p3D, s:"Bestseller", l:"3 Hari", dt:3}, {d:7, p:pW, s:"Weekly", l:"1 Minggu", dt:7}, {d:30, p:bp, s:"Favorit", l:"1 Bulan", dt:30}, {d:365, p:pY, s:"Hemat 16%", l:"1 Tahun", dt:365}];
        }
        
        function rDP(){
            const pc=document.getElementById('plansWrap'); pc.innerHTML='';
            plans.forEach((pl,ix)=>{
                const cl = document.createElement('div'); cl.className= ix===currentPlanSelected ? 'plan-card active':'plan-card';
                cl.onclick=()=>{hapticLight(); currentPlanSelected=ix; rDP();};
                cl.innerHTML=`<div class="plan-title">${pl.l}</div><div class="plan-price">Rp ${pl.p.toLocaleString('id-ID')}</div>${pl.s?`<div class="plan-save">${pl.s}</div>`:''}`;
                pc.appendChild(cl);
            });
            document.getElementById('btnActionBuy').innerText=`💳 Lanjut Bayar Rp ${plans[currentPlanSelected].p.toLocaleString('id-ID')}`;
        }
        
        function executeBuy(){ hapticHeavy(); tg.openTelegramLink(`https://t.me/${dynamicBotUsername}?start=buy_prem_${plans[currentPlanSelected].dt}_general`); tg.close(); }

        async function fetchImage(fileId) { if (!fileId || !botToken) return null; const cK = `tgI_${fileId}`; const ch = sessionStorage.getItem(cK); if(ch) return ch; try { const r = await fetch(`https://api.telegram.org/bot${botToken}/getFile?file_id=${fileId}`); const j = await r.json(); if (j.ok && j.result.file_path) { const u = `https://api.telegram.org/file/bot${botToken}/${j.result.file_path}`; sessionStorage.setItem(cK, u); return u; } } catch (e) {} return null; }
        
        function createCard(i, cid) {
            const cd = document.createElement('div'); cd.className = 'movie-card'; const isF = favorites.includes(i.id); const bC = i.is_prem ? 'tag-prem' : 'tag-free'; const bT = i.is_prem ? `<svg viewBox="0 0 24 24" width="9" height="9" fill="currentColor"><path d="M12 2L2 9l3 13h14l3-13-10-7zm0 2.5l6.5 4.5-3.5 1-3-3.5-3 3.5-3.5-1 6.5-4.5z"/></svg> Premium` : 'Gratis'; const favC = isF ? 'fav-btn active' : 'fav-btn';
            const fP = isF ? "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" : "M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z";
            cd.innerHTML = `<div class="movie-poster-container shimmer" id="shim-${cid}-${i.id}"><img id="im-${cid}-${i.id}" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Poster"></div><div class="movie-info"><div class="movie-title">${i.t}</div><div class="card-actions"><span class="${bC}">${bT}</span><div class="action-right"><button class="${favC}" id="fav-${cid}-${i.id}"><svg viewBox="0 0 24 24"><path d="${fP}"/></svg></button><span class="play-indicator"><svg viewBox="0 0 24 24" width="10" height="10" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play</span></div></div></div>`;
            cd.querySelector('.movie-poster-container').onclick = () => { hapticHeavy(); historyList=[i.id, ...historyList.filter(x => x !== i.id)].slice(0,30); updateStorage(); tg.openTelegramLink(`https://t.me/${dynamicBotUsername}?start=mp_${i.id}`); tg.close(); };
            const fbBtn = cd.querySelector(`#fav-${cid}-${i.id}`); fbBtn.onclick = (e) => { e.stopPropagation(); hapticLight(); const pH=fbBtn.querySelector('path'); if (favorites.includes(i.id)) { favorites=favorites.filter(x=>x!==i.id); fbBtn.className='fav-btn'; pH.setAttribute('d', "M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z");} else{ favorites.unshift(i.id); fbBtn.className='fav-btn active'; pH.setAttribute('d', "M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z");} updateStorage(); renderAllTabs(); };
            document.getElementById(cid).appendChild(cd);
            fetchImage(i.p).then(u=>{ if(u){ const im = document.getElementById(`im-${cid}-${i.id}`); if(im){ im.src=u; im.onload=()=>{ im.classList.add('loaded'); const s = document.getElementById(`shim-${cid}-${i.id}`); if(s) s.classList.remove('shimmer');};}} });
        }

        function uPg(t, cp, ti) { const pg=document.getElementById(`${t}Pagination`); if(ti<=ITEMS_PER_PAGE){pg.style.display='none'; return;} pg.style.display='flex'; const m=Math.ceil(ti/ITEMS_PER_PAGE)||1; document.getElementById(`pageCurrent${t.charAt(0).toUpperCase()+t.slice(1)}`).innerText=cp; document.getElementById(`pageTotal${t.charAt(0).toUpperCase()+t.slice(1)}`).innerText=m; document.getElementById(`prev${t.charAt(0).toUpperCase()+t.slice(1)}`).disabled=(cp===1); document.getElementById(`next${t.charAt(0).toUpperCase()+t.slice(1)}`).disabled=(cp===m); const dc=document.getElementById(`${t}Dots`); dc.innerHTML=''; const s=Math.max(1,cp-2); const e=Math.min(m,s+4); for(let i=s; i<=e; i++){ const dt=document.createElement('div'); dt.className=i===cp?'dot active':'dot'; dc.appendChild(dt); } }
        function changePage(t, d){ hapticLight(); pageState[t]+=d; if(t==='home') renderTabHome(); if(t==='fav') renderTabFav(); if(t==='hist') renderTabHist(); window.scrollTo({top:0, behavior:'smooth'}); }
        function getF(d){ return d.filter(i=>i.t.toLowerCase().includes(searchQuery)&&(currentFilter==='all'||(currentFilter==='prem'&&i.is_prem===1)||(currentFilter==='free'&&i.is_prem===0)));}
        function pagD(d, p){ const s=(p-1)*ITEMS_PER_PAGE; return d.slice(s, s+ITEMS_PER_PAGE);}

        function renderTabHome() { const gr=document.getElementById('homeGrid'); const emp=document.getElementById('homeEmpty'); gr.innerHTML=''; emp.style.display='none'; let fD=getF(catalogData); if(fD.length===0){emp.style.display='block'; document.getElementById('homePagination').style.display='none'; return;} let pD=pagD(fD, pageState.home); pD.forEach(i=>createCard(i,'homeGrid')); uPg('home', pageState.home, fD.length); }
        function renderTabFav() { const gr=document.getElementById('favGrid'); const emp=document.getElementById('favEmpty'); gr.innerHTML=''; emp.style.display='none'; let fD=getF(catalogData.filter(i=>favorites.includes(i.id)).sort((a,b)=>favorites.indexOf(a.id)-favorites.indexOf(b.id))); if(fD.length===0){emp.style.display='block'; document.getElementById('favPagination').style.display='none'; return;} const mP=Math.ceil(fD.length/ITEMS_PER_PAGE); if(pageState.fav>mP && mP>0) pageState.fav=mP; pagD(fD,pageState.fav).forEach(i=>createCard(i,'favGrid')); uPg('fav', pageState.fav, fD.length);}
        function renderTabHist(){ const gr=document.getElementById('histGrid'); const emp=document.getElementById('histEmpty'); gr.innerHTML=''; emp.style.display='none'; let fD=getF(catalogData.filter(i=>historyList.includes(i.id)).sort((a,b)=>historyList.indexOf(a.id)-historyList.indexOf(b.id))); if(fD.length===0){emp.style.display='block'; document.getElementById('histPagination').style.display='none'; return;} const mP=Math.ceil(fD.length/ITEMS_PER_PAGE); if(pageState.hist>mP && mP>0) pageState.hist=mP; pagD(fD,pageState.hist).forEach(i=>createCard(i,'histGrid')); uPg('hist', pageState.hist, fD.length);}
        function renderAllTabs(){ renderTabHome(); if(document.getElementById('view-fav').classList.contains('active')) renderTabFav(); if(document.getElementById('view-hist').classList.contains('active')) renderTabHist(); }

        document.getElementById('searchInput').addEventListener('input', (e)=>{searchQuery=e.target.value.toLowerCase(); pageState.home=1; pageState.fav=1; pageState.hist=1; renderAllTabs();});
        document.querySelectorAll('.filter-btn').forEach(btn=>{ btn.addEventListener('click', (e)=>{hapticLight(); document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); e.target.classList.add('active'); currentFilter=e.target.getAttribute('data-filter'); pageState.home=1; pageState.fav=1; pageState.hist=1; renderAllTabs();});});
        document.querySelectorAll('.nav-item').forEach(nav=>{ nav.addEventListener('click', (e)=>{ hapticLight(); document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); const tG=e.currentTarget; tG.classList.add('active'); const tId=tG.getAttribute('data-tab'); document.querySelectorAll('.view-section').forEach(v=>v.classList.remove('active')); document.getElementById('view-'+tId).classList.add('active'); if(tId==='home') { document.getElementById('upgradeContainer').style.display = (sysVars.uid_saweria.trim()!==""&&!sysVars.isP) ? "block" : "none"; renderTabHome(); } else { document.getElementById('upgradeContainer').style.display = 'none'; } if(tId==='fav') renderTabFav(); if(tId==='hist') renderTabHist(); window.scrollTo(0,0);});});
        
        initApp();
    </script>
</body>
</html>
